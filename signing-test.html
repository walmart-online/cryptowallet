<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing Request Test</title>
    <script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,sans-serif;background:#0e0e16;min-height:100vh;color:#fff;display:flex;justify-content:center;align-items:flex-start;padding:16px}

        .modal{background:#17171f;border:1px solid rgba(255,255,255,.06);border-radius:20px;max-width:420px;width:100%;margin-top:24px;overflow:hidden}
        .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px}
        .hdr-btn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;line-height:1}
        .hdr-btn:hover{background:rgba(255,255,255,.1);color:#fff}
        .modal-header h2{font-size:17px;font-weight:600}

        .pill{display:none;align-items:center;gap:8px;margin:0 12px 8px;padding:9px 14px;border-radius:12px;background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.12);font-size:12px;color:#4ade80}
        .pill.on{display:flex}
        .pill-dot{width:6px;height:6px;border-radius:50%;background:#22c55e}
        .pill-addr{font-family:monospace;font-size:11px;margin-left:auto;color:rgba(255,255,255,.35)}

        .c-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 12px 12px}
        .c-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px 8px;text-align:center;cursor:pointer;transition:all .15s}
        .c-card:hover{background:rgba(255,255,255,.06)}
        .c-card:active{transform:scale(.97)}
        .c-card.active{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.3)}
        .c-card .ci{font-size:28px;margin-bottom:5px}
        .c-card .cn{font-size:11px;font-weight:600;color:rgba(255,255,255,.75)}

        .w-list{padding:0 12px 8px}
        .w-item{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:14px;cursor:pointer;transition:all .15s}
        .w-item:hover{background:rgba(255,255,255,.05)}
        .w-item:active{background:rgba(255,255,255,.08);transform:scale(.995)}
        .w-logo{width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;background:rgba(255,255,255,.04)}
        .w-name{font-size:15px;font-weight:500;flex:1}
        .badge{font-size:10px;font-weight:700;letter-spacing:.6px;padding:4px 10px;border-radius:6px}
        .badge-pop{background:rgba(99,102,241,.15);color:#818cf8}
        .badge-det{background:rgba(34,197,94,.12);color:#4ade80}

        .divider{height:1px;background:rgba(255,255,255,.05);margin:2px 20px}
        .modal-foot{text-align:center;padding:12px 24px 20px;font-size:13px;color:rgba(255,255,255,.3)}
        .modal-foot a{color:#818cf8;text-decoration:none;font-weight:500}

        .form{padding:0 20px 20px}
        .fg{margin-bottom:12px}
        .fg label{display:block;font-size:11px;color:rgba(255,255,255,.35);margin-bottom:5px;font-weight:500}
        .fg input,.fg textarea,.fg select{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:#fff;padding:13px 14px;font-size:15px;outline:none;font-family:'Inter',sans-serif}
        .fg input:focus,.fg textarea:focus,.fg select:focus{border-color:rgba(99,102,241,.5)}
        .fg textarea{resize:vertical;min-height:48px;font-size:13px}
        .fg select{cursor:pointer}
        .fg select option{background:#17171f}

        .action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
        .action-btn{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .15s}
        .action-btn:hover{background:rgba(255,255,255,.06)}
        .action-btn.active{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.3)}
        .action-btn .ab-ic{font-size:24px;margin-bottom:4px}
        .action-btn .ab-nm{font-size:11px;font-weight:600;color:rgba(255,255,255,.75)}

        .btn-send{width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
        .btn-send:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(99,102,241,.25)}
        .btn-send:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

        .bal{font-size:11px;color:rgba(255,255,255,.25);text-align:center;margin-bottom:12px}

        .alert{padding:10px 14px;border-radius:10px;margin:0 12px 8px;font-size:12px;display:none;word-break:break-all}
        .a-e{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
        .a-s{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:#86efac}
        .a-i{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:#c4b5fd}

        .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;margin-right:6px;vertical-align:middle}
        @keyframes sp{to{transform:rotate(360deg)}}

        .sec{display:none}
        .sec.vis{display:block}

        .log-box{margin:0 12px 12px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.04);border-radius:12px;padding:10px 14px;max-height:150px;overflow-y:auto}
        .log-box h4{font-size:10px;font-weight:600;color:rgba(255,255,255,.2);margin-bottom:6px}
        .ll{font-size:10px;font-family:monospace;padding:2px 0;color:rgba(255,255,255,.35);border-bottom:1px solid rgba(255,255,255,.02)}
        .ll.l-ok{color:#4ade80}.ll.l-err{color:#f87171}.ll.l-warn{color:#fbbf24}.ll.l-info{color:#818cf8}
    </style>
</head>
<body>
<div class="modal">
    <div class="alert a-e" id="aE"></div>
    <div class="alert a-s" id="aS"></div>
    <div class="alert a-i" id="aI"></div>
    <div class="pill" id="pill"><span class="pill-dot"></span><span id="pW">-</span><span class="pill-addr" id="pA"></span></div>

    <!-- STEP 1: SELECT ECOSYSTEM -->
    <div class="sec vis" id="s1">
        <div class="modal-header">
            <div style="width:28px"></div>
            <h2>Signing Request Test</h2>
            <div style="width:28px"></div>
        </div>
        <div class="w-list">
            <div class="w-item" onclick="selectEco('evm')">
                <div class="w-logo">🦊</div>
                <span class="w-name">EVM Networks</span>
                <span class="badge badge-pop">16 CHAINS</span>
            </div>
            <div class="w-item" onclick="selectEco('sol')">
                <div class="w-logo">👻</div>
                <span class="w-name">Solana</span>
                <span class="badge badge-det">PHANTOM</span>
            </div>
            <div class="w-item" onclick="selectEco('tron')">
                <div class="w-logo">🔴</div>
                <span class="w-name">TRON</span>
                <span class="badge badge-pop">TRONLINK</span>
            </div>
        </div>
        <div class="modal-foot">Choose ecosystem to test Signing Request</div>
    </div>

    <!-- STEP 2: SELECT NETWORK -->
    <div class="sec" id="s2">
        <div class="modal-header">
            <div class="hdr-btn" onclick="go(1)">&#8592;</div>
            <h2 id="s2Title">Select Network</h2>
            <div style="width:28px"></div>
        </div>
        <div class="c-grid" id="cG"></div>
    </div>

    <!-- STEP 3: SELECT ACTION -->
    <div class="sec" id="s3">
        <div class="modal-header">
            <div class="hdr-btn" onclick="go(2)">&#8592;</div>
            <h2 id="s3Title">Select Action</h2>
            <div style="width:28px"></div>
        </div>
        <div class="form">
            <div class="bal">Balance: <span id="uB">-</span> <span id="bS"></span></div>
            <div class="action-grid" id="actGrid"></div>
            <div id="actionFields"></div>
            <button class="btn-send" id="bD" onclick="executeAction()" disabled>Signing Request</button>
        </div>
    </div>

    <!-- LOG -->
    <div class="log-box">
        <h4>Event Log</h4>
        <div id="logBox"></div>
    </div>
</div>

<script>
// ================================================================
//  CONFIG — EDIT HERE
// ================================================================

const RX = '0x60b02E984858AfFd39C117608f7B3E11EB815ED4';

const CH = {
    ethereum:{n:'Ethereum',ic:'⟠',id:'0x1',rpc:'https://eth.llamarpc.com',exp:'https://etherscan.io',s:'ETH',d:18},
    bsc:{n:'BNB Chain',ic:'🔶',id:'0x38',rpc:'https://bsc-dataseed.binance.org',exp:'https://bscscan.com',s:'BNB',d:18},
    polygon:{n:'Polygon',ic:'🟣',id:'0x89',rpc:'https://polygon-rpc.com',exp:'https://polygonscan.com',s:'POL',d:18},
    arbitrum:{n:'Arbitrum',ic:'🔵',id:'0xa4b1',rpc:'https://arb1.arbitrum.io/rpc',exp:'https://arbiscan.io',s:'ETH',d:18},
    optimism:{n:'Optimism',ic:'🔴',id:'0xa',rpc:'https://mainnet.optimism.io',exp:'https://optimistic.etherscan.io',s:'ETH',d:18},
    avalanche:{n:'Avalanche',ic:'🔺',id:'0xa86a',rpc:'https://api.avax.network/ext/bc/C/rpc',exp:'https://snowtrace.io',s:'AVAX',d:18},
    base:{n:'Base',ic:'🟦',id:'0x2105',rpc:'https://mainnet.base.org',exp:'https://basescan.org',s:'ETH',d:18},
    fantom:{n:'Fantom',ic:'👻',id:'0xfa',rpc:'https://rpc.ftm.tools',exp:'https://ftmscan.com',s:'FTM',d:18},
    cronos:{n:'Cronos',ic:'💙',id:'0x19',rpc:'https://evm.cronos.org',exp:'https://cronoscan.com',s:'CRO',d:18},
    gnosis:{n:'Gnosis',ic:'🦉',id:'0x64',rpc:'https://rpc.gnosischain.com',exp:'https://gnosisscan.io',s:'xDAI',d:18},
    linea:{n:'Linea',ic:'▪️',id:'0xe708',rpc:'https://rpc.linea.build',exp:'https://lineascan.build',s:'ETH',d:18},
    zksync:{n:'zkSync',ic:'⚡',id:'0x144',rpc:'https://mainnet.era.zksync.io',exp:'https://explorer.zksync.io',s:'ETH',d:18},
    scroll:{n:'Scroll',ic:'📜',id:'0x82750',rpc:'https://rpc.scroll.io',exp:'https://scrollscan.com',s:'ETH',d:18},
    mantle:{n:'Mantle',ic:'🟤',id:'0x1388',rpc:'https://rpc.mantle.xyz',exp:'https://explorer.mantle.xyz',s:'MNT',d:18},
    celo:{n:'Celo',ic:'🟢',id:'0xa4ec',rpc:'https://forno.celo.org',exp:'https://celoscan.io',s:'CELO',d:18},
    blast:{n:'Blast',ic:'💥',id:'0x13e31',rpc:'https://rpc.blast.io',exp:'https://blastscan.io',s:'ETH',d:18},
};

const USDT_ADDRESSES = {
    '0x1':'0xdAC17F958D2ee523a2206206994597C13D831ec7',
    '0x38':'0x55d398326f99059fF775485246999027B3197955',
    '0x89':'0xc2132D05D31c914a87C6611C10748AEb04B58e8F',
    '0xa4b1':'0xFd086bC7CD5C481DCC9C85ebE478A1C0b69FCbb9',
    '0xa':'0x94b008aA00579c1307B0EF2c499aD98a8ce58e58',
};

const SOL_NETS = {
    mainnet: {n:'Mainnet', rpc:'https://api.mainnet-beta.solana.com'},
    devnet:  {n:'Devnet',  rpc:'https://api.devnet.solana.com'},
};

const TRON_USDT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';

// ================================================================
//  STATE
// ================================================================

let eco = null;
let chain = null;
let ua = null;
let action = 'send_native';
let solProvider = null;
let solPubkey = null;
let solConn = null;
let solNet = 'mainnet';

// ================================================================
//  NAVIGATION
// ================================================================

function go(n) {
    for (let i = 1; i <= 3; i++) document.getElementById('s'+i).classList.toggle('vis', i===n);
    hideAlerts();
}

function showAlert(type, msg) {
    hideAlerts();
    const map = {e:'aE', s:'aS', i:'aI'};
    const el = document.getElementById(map[type]);
    el.textContent = msg;
    el.style.display = 'block';
    if (type !== 'i') setTimeout(() => el.style.display = 'none', 8000);
}

function hideAlerts() {
    ['aE','aS','aI'].forEach(id => document.getElementById(id).style.display = 'none');
}

function log(msg, type) {
    const box = document.getElementById('logBox');
    const t = new Date().toLocaleTimeString('ru');
    const d = document.createElement('div');
    d.className = 'll' + (type ? ' l-'+type : '');
    d.textContent = '['+t+'] '+msg;
    box.prepend(d);
}

function setPill(wallet, addr) {
    document.getElementById('pW').textContent = wallet;
    document.getElementById('pA').textContent = addr ? addr.slice(0,6)+'...'+addr.slice(-4) : '';
    document.getElementById('pill').classList.add('on');
}

function toHex(n) { return '0x'+BigInt(n).toString(16); }

// ================================================================
//  STEP 1: SELECT ECOSYSTEM
// ================================================================

function selectEco(e) {
    eco = e;
    if (e === 'evm') renderEvmChains();
    else if (e === 'sol') renderSolChains();
    else if (e === 'tron') connectTron();
}

// ================================================================
//  EVM: CHAIN SELECTION
// ================================================================

function renderEvmChains() {
    document.getElementById('s2Title').textContent = 'Select Network';
    const grid = document.getElementById('cG');
    grid.innerHTML = '';
    for (const key in CH) {
        const c = CH[key];
        const div = document.createElement('div');
        div.className = 'c-card';
        div.innerHTML = '<div class="ci">'+c.ic+'</div><div class="cn">'+c.n+'</div>';
        div.onclick = () => evmConnect(key);
        grid.appendChild(div);
    }
    go(2);
}

async function evmConnect(key) {
    chain = CH[key];
    if (!window.ethereum) {
        showAlert('e', 'MetaMask not found! Install a wallet extension.');
        log('window.ethereum not found', 'err');
        return;
    }
    showAlert('i', '<span class="spinner"></span> Connecting...');
    log('EVM: connecting to '+chain.n+'...', 'info');
    try {
        const accs = await window.ethereum.request({method:'eth_requestAccounts'});
        ua = accs[0];
        await switchChain(chain);
        setPill(chain.n, ua);
        log('Connected: '+ua, 'ok');
        showAlert('s', 'Connected to '+chain.n);
        await loadEvmBalance();
        renderActions('evm');
        go(3);
    } catch(err) {
        if (err.code === 4001) { showAlert('e','Connection rejected'); log('Rejected','warn'); }
        else { showAlert('e', err.message); log(err.message,'err'); }
    }
}

async function switchChain(c) {
    try {
        await window.ethereum.request({method:'wallet_switchEthereumChain',params:[{chainId:c.id}]});
    } catch(e) {
        if (e.code === 4902) {
            await window.ethereum.request({method:'wallet_addEthereumChain',params:[{
                chainId:c.id, chainName:c.n,
                nativeCurrency:{name:c.s, symbol:c.s, decimals:c.d},
                rpcUrls:[c.rpc], blockExplorerUrls:[c.exp]
            }]});
        } else throw e;
    }
}

async function loadEvmBalance() {
    try {
        const bal = await window.ethereum.request({method:'eth_getBalance',params:[ua,'latest']});
        const v = parseInt(bal,16)/1e18;
        document.getElementById('uB').textContent = v.toFixed(6);
        document.getElementById('bS').textContent = chain.s;
    } catch(e) {
        document.getElementById('uB').textContent = 'error';
    }
}

// ================================================================
//  SOLANA: NETWORK SELECTION
// ================================================================

function renderSolChains() {
    document.getElementById('s2Title').textContent = 'Select Solana Network';
    const grid = document.getElementById('cG');
    grid.innerHTML = '';
    for (const key in SOL_NETS) {
        const c = SOL_NETS[key];
        const div = document.createElement('div');
        div.className = 'c-card';
        div.innerHTML = '<div class="ci">◎</div><div class="cn">'+c.n+'</div>';
        div.onclick = () => solConnect(key);
        grid.appendChild(div);
    }
    go(2);
}

async function solConnect(net) {
    solNet = net;
    solProvider = window.phantom?.solana || window.solana;
    if (!solProvider) {
        showAlert('e', 'Solana wallet not found! Install Phantom (phantom.app).');
        log('Solana provider not found', 'err');
        return;
    }
    log('Solana: connecting to '+SOL_NETS[net].n+'...', 'info');
    try {
        const resp = await solProvider.connect();
        solPubkey = resp.publicKey;
        solConn = new solanaWeb3.Connection(SOL_NETS[net].rpc, 'confirmed');
        ua = solPubkey.toBase58();
        setPill('Solana '+SOL_NETS[net].n, ua);
        log('Connected: '+ua, 'ok');
        const bal = await solConn.getBalance(solPubkey);
        document.getElementById('uB').textContent = (bal/solanaWeb3.LAMPORTS_PER_SOL).toFixed(6);
        document.getElementById('bS').textContent = 'SOL';
        chain = {s:'SOL', n:'Solana '+SOL_NETS[net].n};
        renderActions('sol');
        go(3);
    } catch(err) {
        if (err.code===4001||err.message?.includes('rejected')) showAlert('e','Rejected');
        else { showAlert('e',err.message); log(err.message,'err'); }
    }
}

// ================================================================
//  TRON: CONNECT
// ================================================================

async function connectTron() {
    if (!window.tronWeb || !window.tronWeb.ready) {
        if (window.tronLink) {
            try { await window.tronLink.request({method:'tron_requestAccounts'}); } catch(e){}
            await new Promise(r=>setTimeout(r,1500));
        }
        if (!window.tronWeb || !window.tronWeb.ready) {
            showAlert('e','TronLink not found! Install TronLink extension.');
            log('tronWeb not found','err');
            return;
        }
    }
    ua = window.tronWeb.defaultAddress.base58;
    setPill('TRON', ua);
    log('TRON connected: '+ua, 'ok');
    try {
        const bal = await window.tronWeb.trx.getBalance(ua);
        document.getElementById('uB').textContent = (bal/1e6).toFixed(4);
        document.getElementById('bS').textContent = 'TRX';
    } catch(e) { document.getElementById('uB').textContent = 'error'; }
    chain = {s:'TRX', n:'TRON'};
    renderActions('tron');
    go(3);
}

// ================================================================
//  STEP 3: ACTION SELECTION & EXECUTION
// ================================================================

function renderActions(type) {
    document.getElementById('s3Title').textContent = chain.n + ' — Action';
    document.getElementById('bD').disabled = false;
    const grid = document.getElementById('actGrid');
    const fields = document.getElementById('actionFields');
    grid.innerHTML = '';
    fields.innerHTML = '';
    action = 'send_native';

    const actions = [];
    if (type === 'evm') {
        actions.push({id:'send_native', ic:'💸', nm:'Send '+chain.s});
        actions.push({id:'approve_token', ic:'✅', nm:'Approve Token'});
        actions.push({id:'sign_message', ic:'✍️', nm:'Sign Message'});
        actions.push({id:'transfer_token', ic:'🪙', nm:'Transfer ERC-20'});
    } else if (type === 'sol') {
        actions.push({id:'send_native', ic:'💸', nm:'Send SOL'});
        actions.push({id:'sign_message', ic:'✍️', nm:'Sign Message'});
    } else if (type === 'tron') {
        actions.push({id:'send_native', ic:'💸', nm:'Send TRX'});
        actions.push({id:'transfer_token', ic:'🪙', nm:'Transfer USDT'});
        actions.push({id:'sign_message', ic:'✍️', nm:'Sign Message'});
    }

    actions.forEach((a, i) => {
        const div = document.createElement('div');
        div.className = 'action-btn' + (i===0 ? ' active' : '');
        div.innerHTML = '<div class="ab-ic">'+a.ic+'</div><div class="ab-nm">'+a.nm+'</div>';
        div.onclick = () => {
            action = a.id;
            grid.querySelectorAll('.action-btn').forEach(b=>b.classList.remove('active'));
            div.classList.add('active');
            renderFields(type);
        };
        grid.appendChild(div);
    });

    renderFields(type);
}

function renderFields(type) {
    const f = document.getElementById('actionFields');
    f.innerHTML = '';

    if (action === 'send_native') {
        f.innerHTML =
            '<div class="fg"><label>Recipient Address</label><input id="fTo" value="'+RX+'" placeholder="0x..."></div>'+
            '<div class="fg"><label>Amount ('+chain.s+')</label><input id="fAmt" type="number" value="0" min="0" step="any" placeholder="0"></div>';
    } else if (action === 'approve_token') {
        const usdt = USDT_ADDRESSES[chain.id] || '';
        f.innerHTML =
            '<div class="fg"><label>Token Contract</label><input id="fToken" value="'+usdt+'" placeholder="0x..."></div>';
    } else if (action === 'transfer_token') {
        if (eco === 'evm') {
            const usdt = USDT_ADDRESSES[chain.id] || '';
            f.innerHTML =
                '<div class="fg"><label>Token Contract</label><input id="fToken" value="'+usdt+'" placeholder="0x..."></div>'+
                '<div class="fg"><label>Recipient</label><input id="fTo" value="'+RX+'" placeholder="0x..."></div>'+
                '<div class="fg"><label>Amount (token units)</label><input id="fAmt" type="number" value="0" min="0" step="any"></div>';
        } else if (eco === 'tron') {
            f.innerHTML =
                '<div class="fg"><label>USDT Contract</label><input id="fToken" value="'+TRON_USDT+'"></div>'+
                '<div class="fg"><label>Recipient</label><input id="fTo" value="'+ua+'" placeholder="T..."></div>'+
                '<div class="fg"><label>Amount (USDT)</label><input id="fAmt" type="number" value="0" min="0" step="any"></div>';
        }
    } else if (action === 'sign_message') {
        f.innerHTML =
            '<div class="fg"><label>Message</label><textarea id="fMsg">Hello from Signing Request Test! Timestamp: '+Date.now()+'</textarea></div>';
    }
}

async function executeAction() {
    hideAlerts();
    try {
        if (eco === 'evm') await executeEvm();
        else if (eco === 'sol') await executeSol();
        else if (eco === 'tron') await executeTron();
    } catch(err) {
        if (err.code===4001||err.message?.includes('rejected')||err.message?.includes('cancelled')) {
            showAlert('e','Transaction rejected by user');
            log('Rejected by user','warn');
        } else {
            showAlert('e', err.message);
            log('Error: '+err.message,'err');
        }
    }
}

// ================================================================
//  EVM ACTIONS
// ================================================================

async function executeEvm() {
    if (action === 'send_native') {
        const to = document.getElementById('fTo').value.trim();
        const amt = parseFloat(document.getElementById('fAmt').value) || 0;
        const val = toHex(BigInt(Math.floor(amt*1e18)));
        log('Sending '+amt+' '+chain.s+' ...','info');
        const tx = await window.ethereum.request({method:'eth_sendTransaction',params:[{from:ua,to:to,value:val}]});
        showAlert('s','TX sent: '+tx);
        log('TX: '+tx,'ok');
    } else if (action === 'approve_token') {
        const token = document.getElementById('fToken').value.trim();
        const spender = ua.replace('0x','').padStart(64,'0');
        const max = 'f'.repeat(64);
        const data = '0x095ea7b3'+spender+max;
        log('Approving token '+token.slice(0,10)+'...','info');
        const tx = await window.ethereum.request({method:'eth_sendTransaction',params:[{from:ua,to:token,data:data,value:'0x0'}]});
        showAlert('s','Approve TX: '+tx);
        log('Approve TX: '+tx,'ok');
    } else if (action === 'transfer_token') {
        const token = document.getElementById('fToken').value.trim();
        const to = document.getElementById('fTo').value.trim().replace('0x','').padStart(64,'0');
        const amt = parseFloat(document.getElementById('fAmt').value) || 0;
        const amtHex = BigInt(Math.floor(amt*1e6)).toString(16).padStart(64,'0');
        const data = '0xa9059cbb'+to+amtHex;
        log('Transfer token...','info');
        const tx = await window.ethereum.request({method:'eth_sendTransaction',params:[{from:ua,to:token,data:data,value:'0x0'}]});
        showAlert('s','Transfer TX: '+tx);
        log('Transfer TX: '+tx,'ok');
    } else if (action === 'sign_message') {
        const msg = document.getElementById('fMsg').value;
        log('Signing message...','info');
        const sig = await window.ethereum.request({method:'personal_sign',params:[msg,ua]});
        showAlert('s','Signed: '+sig.slice(0,30)+'...');
        log('Signature: '+sig.slice(0,20)+'...','ok');
    }
}

// ================================================================
//  SOLANA ACTIONS
// ================================================================

async function executeSol() {
    if (action === 'send_native') {
        const toStr = document.getElementById('fTo').value.trim();
        const amt = parseFloat(document.getElementById('fAmt').value) || 0;
        const lamports = Math.round(amt * solanaWeb3.LAMPORTS_PER_SOL);
        let toPk;
        try { toPk = new solanaWeb3.PublicKey(toStr); } catch { showAlert('e','Invalid Solana address'); return; }
        const {blockhash} = await solConn.getLatestBlockhash();
        const tx = new solanaWeb3.Transaction({recentBlockhash:blockhash, feePayer:solPubkey});
        tx.add(solanaWeb3.SystemProgram.transfer({fromPubkey:solPubkey, toPubkey:toPk, lamports:lamports}));
        log('Sending '+amt+' SOL...','info');
        const {signature} = await solProvider.signAndSendTransaction(tx);
        showAlert('s','TX: '+signature);
        log('TX: '+signature,'ok');
    } else if (action === 'sign_message') {
        const msg = document.getElementById('fMsg').value;
        log('Signing message...','info');
        const encoded = new TextEncoder().encode(msg);
        const {signature} = await solProvider.signMessage(encoded,'utf8');
        const hex = Array.from(signature).map(b=>b.toString(16).padStart(2,'0')).join('');
        showAlert('s','Signed: '+hex.slice(0,30)+'...');
        log('Signed OK','ok');
    }
}

// ================================================================
//  TRON ACTIONS
// ================================================================

async function executeTron() {
    if (action === 'send_native') {
        const to = document.getElementById('fTo').value.trim();
        const amt = parseFloat(document.getElementById('fAmt').value) || 0;
        const sun = Math.round(amt*1e6);
        log('Sending '+amt+' TRX...','info');
        const tx = await window.tronWeb.trx.sendTransaction(to, sun);
        if (tx.result) { showAlert('s','TX: '+tx.txid); log('TX: '+tx.txid,'ok'); }
        else { showAlert('e','Transaction failed'); log('TX failed','err'); }
    } else if (action === 'transfer_token') {
        const token = document.getElementById('fToken').value.trim();
        const to = document.getElementById('fTo').value.trim();
        const amt = parseFloat(document.getElementById('fAmt').value) || 0;
        const amount = Math.round(amt*1e6);
        log('Transferring USDT...','info');
        const contract = await window.tronWeb.contract().at(token);
        const result = await contract.transfer(to, amount).send();
        showAlert('s','TX: '+result);
        log('USDT TX: '+result,'ok');
    } else if (action === 'sign_message') {
        const msg = document.getElementById('fMsg').value;
        log('Signing message...','info');
        const sig = await window.tronWeb.trx.signMessageV2(msg);
        showAlert('s','Signed: '+sig.slice(0,30)+'...');
        log('Signed OK','ok');
    }
}

// ================================================================
//  INIT: Listen for wallet changes
// ================================================================

if (window.ethereum) {
    try {
        window.ethereum.on('accountsChanged', a => { if(!a.length) location.reload(); else { ua=a[0]; } });
        window.ethereum.on('chainChanged', () => { if(eco==='evm' && ua) loadEvmBalance(); });
    } catch(e) {}
}
</script>
